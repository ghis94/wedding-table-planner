<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Plan de table</title>
  <style>
    :root{
      --bg:#f8fafc;--text:#0f172a;--panel:#ffffff;--line:#cbd5e1;--line-2:#e2e8f0;
      --btn:#0f172a;--btn-text:#ffffff;--muted:#64748b;
      --badge-ad:#eef2ff;--badge-ad-text:#3730a3;--badge-en:#ecfeff;--badge-en-text:#155e75;--badge-bb:#fff7ed;--badge-bb-text:#9a3412;
    }
    body{font-family:Arial,sans-serif;margin:0;background:var(--bg);color:var(--text)}
    .wrap{max-width:1200px;margin:0 auto;padding:16px}
    .header{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .top{display:flex;gap:10px;flex-wrap:wrap}
    button,input,textarea,select{padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text)}
    button{background:var(--btn);color:var(--btn-text);cursor:pointer}
    .grid{display:grid;grid-template-columns:340px 1fr;gap:14px;margin-top:12px}
    .panel{background:var(--panel);border:1px solid var(--line-2);border-radius:12px;padding:12px}
    .guest{padding:8px;border:1px solid var(--line);border-radius:8px;margin:8px 0;background:var(--panel);cursor:grab;display:flex;justify-content:space-between;align-items:center;gap:8px}
    .table{border:1px dashed #94a3b8;border-radius:10px;padding:8px;min-height:80px;background:var(--bg)}
    .tables{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
    .muted{color:var(--muted);font-size:13px}
    .danger{background:#7f1d1d}.warn{background:#92400e}.ok{background:#065f46}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .type{font-size:12px;padding:2px 8px;border-radius:999px;font-weight:700;border:1px solid var(--line);background:var(--badge-ad);color:var(--badge-ad-text)}
    .type.enfant{background:var(--badge-en);color:var(--badge-en-text)}
    .type.bebe{background:var(--badge-bb);color:var(--badge-bb-text)}

    body.theme-modern{--bg:#070b17;--text:#e6eefc;--panel:#0f172acc;--line:#334155;--line-2:#243042;--btn:#4f46e5;--btn-text:#fff;--muted:#9fb0c9;--badge-ad:#312e81;--badge-ad-text:#c7d2fe;--badge-en:#083344;--badge-en-text:#a5f3fc;--badge-bb:#422006;--badge-bb-text:#fed7aa}
    body.theme-romance{--bg:#fff7fb;--text:#4a044e;--panel:#ffffff;--line:#f5d0fe;--line-2:#fbcfe8;--btn:#be185d;--btn-text:#fff;--muted:#9d174d;--badge-ad:#fce7f3;--badge-ad-text:#9d174d;--badge-en:#ede9fe;--badge-en-text:#5b21b6;--badge-bb:#fff1f2;--badge-bb-text:#be123c}
    body.theme-forest{--bg:#f0fdf4;--text:#052e16;--panel:#ffffff;--line:#bbf7d0;--line-2:#86efac;--btn:#166534;--btn-text:#fff;--muted:#166534;--badge-ad:#dcfce7;--badge-ad-text:#166534;--badge-en:#ccfbf1;--badge-en-text:#0f766e;--badge-bb:#fef9c3;--badge-bb-text:#854d0e}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>💍 Admin — Plan de table</h1>
      <div class="row" style="min-width:280px;justify-content:flex-end">
        <label for="themeSelect" class="muted">Thème</label>
        <select id="themeSelect" onchange="applyTheme(this.value)" style="max-width:180px">
          <option value="classic">Classique</option>
          <option value="modern">Modern Dark</option>
          <option value="romance">Romance</option>
          <option value="forest">Forest</option>
        </select>
      </div>
    </div>
    <div class="top">
      <button onclick="loadGuests()">Charger RSVPs</button>
      <button onclick="addTable()">+ Table</button>
      <button class="ok" onclick="savePlan()">Sauvegarder plan</button>
      <button onclick="window.print()">Exporter PDF (imprimer)</button>
      <button class="warn" onclick="exportJson()">Exporter JSON</button>
      <button class="warn" onclick="exportConfig()">Exporter config</button>
      <button class="warn" onclick="document.getElementById('configFile').click()">Importer config</button>
      <input id="configFile" type="file" accept="application/json" style="display:none" onchange="importConfig(event)">
      <button class="danger" onclick="resetAll()">Reset</button>
    </div>
    <p class="muted">Drag & drop: glisser un invité vers une table.</p>

    <div class="panel" style="margin-top:10px">
      <h3>Import CSV invités</h3>
      <p class="muted">Colonnes acceptées: `prenom,nom,type` (ou `first_name,last_name,type`, ou `name,type`). `type`: `adulte`, `enfant` ou `bebe`.</p>
      <textarea id="csvInput" rows="4" style="width:100%" placeholder="prenom,nom,type&#10;Alice,Martin,adulte&#10;Lina,Martin,enfant"></textarea>
      <button onclick="importCsv()">Importer CSV</button>
    </div>

    <div class="grid">
      <div class="panel">
        <h3>Invités</h3>
        <div class="row">
          <input id="quickAdd" placeholder="Ajouter un invité rapide" onkeydown="if(event.key==='Enter')quickAddGuest()" style="flex:1" />
          <select id="quickType">
            <option value="adulte">Adulte</option>
            <option value="enfant">Enfant</option>
            <option value="bebe">Bébé</option>
          </select>
        </div>
        <button style="margin-top:8px" onclick="quickAddGuest()">Ajouter</button>
        <div id="guests"></div>
      </div>
      <div class="panel">
        <h3>Tables</h3>
        <div id="tables" class="tables"></div>
      </div>
    </div>
  </div>

  <script>
    let guests=[], tables=[];

    function applyTheme(theme){
      const body=document.body;
      body.classList.remove('theme-modern','theme-romance','theme-forest');
      if(theme==='modern') body.classList.add('theme-modern');
      if(theme==='romance') body.classList.add('theme-romance');
      if(theme==='forest') body.classList.add('theme-forest');
      localStorage.setItem('wtp_theme', theme);
      const sel=document.getElementById('themeSelect');
      if(sel && sel.value!==theme) sel.value=theme;
    }

    async function api(url, opts={}){
      const r = await fetch(url, opts);
      if(!r.ok) throw new Error(await r.text());
      return r.json();
    }

    function normalizeName(g){ return `${(g.prenom||'').trim()} ${(g.nom||'').trim()}`.trim(); }
    function normalizeType(v){
      const t=String(v||'').toLowerCase();
      if(['bebe','bébé','baby','infant','toddlers','toddler'].includes(t)) return 'bebe';
      if(['enfant','child','kids','kid'].includes(t)) return 'enfant';
      return 'adulte';
    }

    function guestTag(g){
      const t=normalizeType(g.type);
      return `<span class="type ${t==='enfant'?'enfant':(t==='bebe'?'bebe':'')}">${t==='enfant'?'Enfant':(t==='bebe'?'Bébé':'Adulte')}</span>`;
    }

    function expandRsvp(r){
      const base = normalizeName(r) || r.name || 'Invité';
      const out = [];
      const a = Math.max(0, Number(r.adultes||0));
      const e = Math.max(0, Number(r.enfants||0));

      if(a===0 && e===0){
        out.push({ id: crypto.randomUUID(), name: base, type: 'adulte' });
        return out;
      }
      for(let i=1;i<=a;i++) out.push({ id: crypto.randomUUID(), name: a===1?base:`${base} (Adulte ${i})`, type:'adulte' });
      for(let i=1;i<=e;i++) out.push({ id: crypto.randomUUID(), name: `${base} (Enfant ${i})`, type:'enfant' });
      return out;
    }

    async function loadGuests(){
      const raw = await api('/api/rsvps');
      const yes = raw.filter(g => String(g.presence||'').toLowerCase()==='oui');
      const expanded = yes.flatMap(expandRsvp);
      guests=[...guests,...expanded.filter(n=>!guests.some(g=>g.name===n.name && normalizeType(g.type)===normalizeType(n.type)))];
      renderGuests();
    }

    function quickAddGuest(){
      const i=document.getElementById('quickAdd');
      const t=document.getElementById('quickType');
      const v=i.value.trim(); if(!v) return;
      guests.push({id:crypto.randomUUID(),name:v,type:normalizeType(t.value)});
      i.value='';
      renderGuests();
    }

    async function importCsv(){
      const csv=document.getElementById('csvInput').value;
      const res=await api('/api/import-csv',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({csv})});
      guests=[...guests,...res.guests.filter(n=>!guests.some(g=>g.name===n.name && normalizeType(g.type)===normalizeType(n.type)))];
      renderGuests();
      alert(`${res.count} invité(s) importé(s)`);
    }

    function addTable(){ const n=tables.length+1; tables.push({id:crypto.randomUUID(),name:'Table '+n,capacity:10,guests:[]}); renderTables(); }
    function removeTable(id){ const t=tables.find(x=>x.id===id); if(!t) return; guests.push(...t.guests); tables=tables.filter(x=>x.id!==id); renderAll(); }

    function renderGuests(){
      const c=document.getElementById('guests'); c.innerHTML='';
      guests.forEach(g=>{
        const d=document.createElement('div');
        d.className='guest'; d.draggable=true; d.dataset.id=g.id;
        d.innerHTML=`<span>${g.name}</span>${guestTag(g)}`;
        d.ondragstart=e=>e.dataTransfer.setData('text/plain',g.id);
        c.appendChild(d);
      });
    }

    function renderTables(){
      const c=document.getElementById('tables'); c.innerHTML='';
      tables.forEach(t=>{
        const b=document.createElement('div'); b.className='table';
        b.ondragover=e=>e.preventDefault();
        b.ondrop=e=>{e.preventDefault(); assignToTable(e.dataTransfer.getData('text/plain'),t.id)};
        const adultCount=(t.guests||[]).filter(g=>normalizeType(g.type)==='adulte').length;
        const childCount=(t.guests||[]).filter(g=>normalizeType(g.type)==='enfant').length;
        const babyCount=(t.guests||[]).filter(g=>normalizeType(g.type)==='bebe').length;
        b.innerHTML=`<h4>${t.name}</h4><div class="muted">Capacité: <input type="number" min="1" value="${t.capacity}" style="width:80px" onchange="setCap('${t.id}',this.value)"></div><div class="muted">Places: ${t.guests.length}/${t.capacity}</div><div class="muted">Adultes: ${adultCount} • Enfants: ${childCount} • Bébés: ${babyCount}</div><button class="danger" style="margin:6px 0" onclick="removeTable('${t.id}')">Supprimer table</button>`;
        t.guests.forEach(g=>{
          const d=document.createElement('div'); d.className='guest';
          d.innerHTML=`<span>${g.name}</span>${guestTag(g)}`;
          d.onclick=()=>unassign(g.id,t.id);
          b.appendChild(d);
        });
        c.appendChild(b);
      });
    }

    function setCap(id,val){ const t=tables.find(x=>x.id===id); if(!t) return; t.capacity=Math.max(1,parseInt(val||'1',10)); renderTables(); }
    function assignToTable(guestId,tableId){ const gi=guests.findIndex(g=>g.id===guestId); if(gi===-1) return; const t=tables.find(x=>x.id===tableId); if(!t) return; if(t.guests.length>=t.capacity){alert('Table pleine');return;} t.guests.push(guests[gi]); guests.splice(gi,1); renderAll(); }
    function unassign(guestId,tableId){ const t=tables.find(x=>x.id===tableId); if(!t) return; const i=t.guests.findIndex(g=>g.id===guestId); if(i===-1) return; guests.push(t.guests[i]); t.guests.splice(i,1); renderAll(); }

    async function savePlan(){ await api('/api/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tables,guests})}); alert('Plan sauvegardé ✅'); }
    function exportJson(){ const blob=new Blob([JSON.stringify({tables,guests,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='plan-de-table.json'; a.click(); }

    async function exportConfig(){
      const cfg = await api('/api/config/export');
      const blob = new Blob([JSON.stringify(cfg, null, 2)], { type:'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `wedding-table-config-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    }

    async function importConfig(event){
      const f = event.target.files?.[0];
      if(!f) return;
      const txt = await f.text();
      let cfg;
      try { cfg = JSON.parse(txt); } catch { alert('JSON invalide'); return; }
      if(!confirm('Importer cette config et remplacer les données actuelles ?')) return;
      await api('/api/config/import', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(cfg) });
      const p = await api('/api/plan');
      guests = p.guests || [];
      tables = p.tables || [];
      renderAll();
      alert('Config importée ✅');
      event.target.value='';
    }

    function resetAll(){ if(!confirm('Réinitialiser le plan ?')) return; guests=[]; tables=[]; renderAll(); }
    function renderAll(){ renderGuests(); renderTables(); }

    (async function boot(){
      const savedTheme = localStorage.getItem('wtp_theme') || 'classic';
      applyTheme(savedTheme);
      try{ const p = await api('/api/plan'); guests=p.guests||[]; tables=p.tables||[]; } catch(e){}
      renderAll();
    })();
  </script>
</body>
</html>
