<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jour J — Wedding Table Planner</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .top { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-top:20px; }
    .tables { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:18px; margin-top:22px; }
    .day-card { border-radius:24px; padding:20px; }
    .day-card h3 { margin-bottom: 8px; }
    ul { margin:14px 0 0; padding:0; display:grid; gap:10px; list-style:none; }
    li {
      padding:12px 14px;
      border-radius:16px;
      background: rgba(255,255,255,.24);
      border: 1px solid var(--line-soft);
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:8px;
    }
    .regime { font-size:11px; color:var(--text-muted); font-style:italic; }
    .notes {
      width:100%;
      font-size:12px;
      color:var(--accent-strong);
      margin-top:4px;
      padding-top:6px;
      border-top:1px dashed var(--line-soft);
    }
  </style>
</head>
<body>
  <script src="theme.js"></script>
  <script src="header.js" defer></script>
  <div class="wrap">
    <div class="crumbs"><a href="admin.html">Admin</a> · <a href="visual.html">Plan visuel</a> · <a href="day-of.html">Jour J</a></div>
    <section class="hero">
      <h1>💍 Jour J</h1>
      <p>Vue opérationnelle épurée pour le staff : lisible, dense juste ce qu’il faut, et enfin alignée avec le reste du produit.</p>
      <div class="top">
        <div class="muted" id="meta"></div>
        <div class="toolbar" style="padding:0;background:none;border:0;box-shadow:none;position:static">
          <button onclick="load()">Rafraîchir</button>
          <button class="ghost" onclick="window.print()">Imprimer</button>
        </div>
      </div>
    </section>
    <div id="tables" class="tables"></div>
  </div>

  <script>
    function typeOf(g){ const t=String(g?.type||'').toLowerCase(); if(['bebe','bébé','baby','infant','toddlers','toddler'].includes(t)) return 'bebe'; if(['enfant','child','kids','kid'].includes(t)) return 'enfant'; return 'adulte'; }
    function typeLabel(t){ return t==='enfant'?'Enfant':(t==='bebe'?'Bébé':'Adulte'); }
    function escapeHtml(v){ return String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;'); }
    let lastPlanHash = '';
    function hashPlan(p){ return JSON.stringify((p.tables||[]).map(t=>({id:t.id,name:t.name,capacity:t.capacity,guests:(t.guests||[]).map(g=>g?.name).sort()})).sort((a,b)=>a.id.localeCompare(b.id))); }
    async function load(){
      const r=await fetch('/api/plan'); const p=await r.json(); const h = hashPlan(p); if(h === lastPlanHash) return; lastPlanHash = h;
      const tables=p.tables||[]; const allGuests=tables.flatMap(t=>t.guests||[]).filter(Boolean); const total=allGuests.length; const adults=allGuests.filter(g=>typeOf(g)==='adulte').length; const kids=allGuests.filter(g=>typeOf(g)==='enfant').length; const babies=allGuests.filter(g=>typeOf(g)==='bebe').length;
      document.getElementById('meta').textContent=`${tables.length} table(s) · ${total} invité(s) · Adultes: ${adults} · Enfants: ${kids} · Bébés: ${babies}`;
      const c=document.getElementById('tables'); c.innerHTML='';
      tables.forEach(t=>{
        const tg=(t.guests||[]).filter(Boolean); const ta=tg.filter(g=>typeOf(g)==='adulte').length; const te=tg.filter(g=>typeOf(g)==='enfant').length; const tb=tg.filter(g=>typeOf(g)==='bebe').length;
        const d=document.createElement('div'); d.className='card day-card';
        d.innerHTML=`<h3>${escapeHtml(t.name)}</h3><div class='muted'>${tg.length}/${t.capacity||0} · Adultes: ${ta} · Enfants: ${te} · Bébés: ${tb}</div>`;
        const ul=document.createElement('ul');
        tg.forEach(g=>{ const li=document.createElement('li'); const typ=typeOf(g); const regime = String(g.regime||'').trim(); const notes = String(g.adminNotes||'').trim(); li.innerHTML=`<span>${escapeHtml(g.name)}</span><span class="badge ${typ}">${typeLabel(typ)}</span>${regime ? `<span class="regime">· ${escapeHtml(regime)}</span>` : ''}${notes ? `<div class="notes">${escapeHtml(notes)}</div>` : ''}`; ul.appendChild(li); });
        if(!tg.length) ul.innerHTML = '<li class="muted">Aucun invité placé à cette table.</li>';
        d.appendChild(ul); c.appendChild(d);
      });
      if(!tables.length) c.innerHTML = '<div class="card text-center muted">Aucune table configurée pour le moment.</div>';
    }
    load(); setInterval(load, 3000);
  </script>
</body>
</html>
