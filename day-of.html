<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jour J — Wedding Table Planner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap');
    :root{--bg:#f3ede3;--bg-soft:#faf6f0;--bg-deep:#efe5d8;--text:#241913;--panel:rgba(255,251,246,.90);--panel-2:rgba(248,240,230,.84);--line:#dccab5;--line-soft:rgba(164,127,89,.18);--muted:#7f6957;--accent:#a47f59;--accent-strong:#7c5836;--accent-soft:#ddc3a5;--shadow:0 20px 48px rgba(67,44,23,.10);--shadow-soft:0 10px 24px rgba(67,44,23,.08);--badge-ad:#f1ebff;--badge-ad-text:#5b21b6;--badge-en:#e8f2fb;--badge-en-text:#32556f;--badge-bb:#fdf0e1;--badge-bb-text:#9b5c24}
    *{box-sizing:border-box}
    body{font-family:'Manrope',Arial,sans-serif;margin:0;background:radial-gradient(circle at top,rgba(255,255,255,.55),transparent 28%),linear-gradient(180deg,var(--bg-soft),var(--bg));color:var(--text)}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.14),transparent 42%),repeating-linear-gradient(0deg,transparent 0 38px,rgba(120,84,53,.028) 38px 39px);opacity:.9}
    .wrap{max-width:1400px;margin:0 auto;padding:28px}
    .crumbs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;color:var(--muted);font-size:12px;letter-spacing:.08em;text-transform:uppercase}
    .crumbs a{color:inherit;text-decoration:none;position:relative}
    .crumbs a::after{content:'';position:absolute;left:0;right:0;bottom:-2px;height:1px;background:currentColor;opacity:.25}
    .hero,.card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line-soft);box-shadow:var(--shadow);backdrop-filter:blur(10px)}
    .hero{border-radius:30px;padding:28px 30px;position:relative;overflow:hidden}
    .hero::after{content:'';position:absolute;inset:auto -80px -120px auto;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(164,127,89,.22),transparent 68%)}
    .hero h1{margin:0 0 8px;font:600 40px/1.05 'Cormorant Garamond',serif;letter-spacing:.02em}
    .hero p{margin:0;color:var(--muted);font-size:15px;line-height:1.6}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:20px}
    .tables{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;margin-top:20px}
    .card{border-radius:24px;padding:20px;background:linear-gradient(180deg,var(--panel),var(--panel-2));box-shadow:var(--shadow)}
    h3{margin:0 0 10px;font:600 22px/1.2 'Cormorant Garamond',serif}
    .muted{color:var(--muted);font-size:13px}
    button{padding:11px 14px;border:1px solid rgba(164,127,89,.22);border-radius:14px;background:linear-gradient(135deg,var(--accent-strong),var(--accent));color:#fffaf4;cursor:pointer;font:inherit;font-weight:600;box-shadow:0 10px 20px rgba(124,88,54,.20)}
    button:hover{transform:translateY(-1px)}
    button.ghost{background:rgba(255,255,255,.6);color:var(--text);border:1px solid rgba(164,127,89,.18);box-shadow:none}
    ul{margin:14px 0 0 0;padding:0;display:grid;gap:8px;list-style:none}
    li{padding:10px 14px;border-radius:16px;background:rgba(255,255,255,.5);border:1px solid rgba(164,127,89,.12);display:flex;flex-wrap:wrap;align-items:center;gap:8px}
    .type{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:700;border:1px solid rgba(130,102,77,.12);white-space:nowrap}
    .type.adulte{background:var(--badge-ad);color:var(--badge-ad-text)}
    .type.enfant{background:var(--badge-en);color:var(--badge-en-text)}
    .type.bebe{background:var(--badge-bb);color:var(--badge-bb-text)}
    .regime{font-size:11px;color:var(--muted);font-style:italic}
    .notes{width:100%;font-size:12px;color:var(--accent-strong);margin-top:4px;padding-top:6px;border-top:1px dashed rgba(164,127,89,.2)}
    @media print{button{display:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="crumbs"><a href="admin.html">Admin</a> · <a href="visual.html">Plan visuel</a> · <a href="day-of.html">Jour J</a></div>
    <section class="hero">
      <h1>💍 Jour J</h1>
      <p>Vue opérationnelle propre et lisible pour suivre les tables, les volumes et les invités placés.</p>
      <div class="top">
        <div class="muted" id="meta"></div>
        <div>
          <button onclick="load()">Rafraîchir</button>
          <button class="ghost" onclick="window.print()">Imprimer</button>
        </div>
      </div>
    </section>
    <div id="tables" class="tables"></div>
  </div>

  <script>
    function typeOf(g){
      const t=String(g?.type||'').toLowerCase();
      if(['bebe','bébé','baby','infant','toddlers','toddler'].includes(t)) return 'bebe';
      if(['enfant','child','kids','kid'].includes(t)) return 'enfant';
      return 'adulte';
    }

    function typeLabel(t){ return t==='enfant'?'Enfant':(t==='bebe'?'Bébé':'Adulte'); }

    function escapeHtml(v){
      return String(v||'')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#39;');
    }

    let lastPlanHash = '';
    function hashPlan(p){
      return JSON.stringify(p.tables?.map(t=>({id:t.id,name:t.name,capacity:t.capacity,guests:(t.guests||[]).map(g=>g.name).sort()})).sort((a,b)=>a.id.localeCompare(b.id)));
    }
    async function load(){
      const r=await fetch('/api/plan');
      const p=await r.json();
      const h = hashPlan(p);
      if(h === lastPlanHash) return; // no change
      lastPlanHash = h;
      const tables=p.tables||[];
      const allGuests=tables.flatMap(t=>t.guests||[]);
      const total=allGuests.length;
      const adults=allGuests.filter(g=>typeOf(g)==='adulte').length;
      const kids=allGuests.filter(g=>typeOf(g)==='enfant').length;
      const babies=allGuests.filter(g=>typeOf(g)==='bebe').length;
      document.getElementById('meta').textContent=`${tables.length} table(s) · ${total} invité(s) · Adultes: ${adults} · Enfants: ${kids} · Bébés: ${babies}`;
      const c=document.getElementById('tables');
      c.innerHTML='';
      tables.forEach(t=>{
        const tg=t.guests||[];
        const ta=tg.filter(g=>typeOf(g)==='adulte').length;
        const te=tg.filter(g=>typeOf(g)==='enfant').length;
        const tb=tg.filter(g=>typeOf(g)==='bebe').length;
        const d=document.createElement('div'); d.className='card';
        d.innerHTML=`<h3>${escapeHtml(t.name)}</h3><div class='muted'>${tg.length}/${t.capacity||0} · Adultes: ${ta} · Enfants: ${te} · Bébés: ${tb}</div>`;
        const ul=document.createElement('ul');
        tg.forEach(g=>{
          const li=document.createElement('li');
          const typ=typeOf(g);
          const regime = String(g.regime||'').trim();
          const notes = String(g.adminNotes||'').trim();
          li.innerHTML=`<span>${escapeHtml(g.name)}</span><span class="type ${typ}">${typeLabel(typ)}</span>${regime ? `<span class="regime">· ${escapeHtml(regime)}</span>` : ''}${notes ? `<div class="notes">${escapeHtml(notes)}</div>` : ''}`;
          ul.appendChild(li);
        });
        d.appendChild(ul); c.appendChild(d);
      });
    }
    load();
    // Auto-refresh every 3s to stay in sync
    setInterval(load, 3000);
  </script>
</body>
</html>
