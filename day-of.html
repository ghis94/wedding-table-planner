<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vue Jour J — Plan de table</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#fff;color:#111827}
    .wrap{max-width:1200px;margin:0 auto;padding:16px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .tables{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-top:12px}
    .card{border:1px solid #d1d5db;border-radius:10px;padding:10px}
    h1,h3{margin:0}
    ul{margin:8px 0 0 18px}
    .muted{color:#6b7280}
    button{padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;background:#111827;color:#fff;cursor:pointer}
    .type{font-size:11px;padding:1px 7px;border-radius:999px;border:1px solid #cbd5e1;margin-left:6px}
    .enfant{background:#ecfeff;color:#155e75}
    .bebe{background:#fff7ed;color:#9a3412}
    .adulte{background:#eef2ff;color:#3730a3}
    @media print{button{display:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>💍 Plan de table — Jour J</h1>
        <div class="muted" id="meta"></div>
      </div>
      <div>
        <button onclick="load()">Rafraîchir</button>
        <button onclick="window.print()">Imprimer</button>
      </div>
    </div>
    <div id="tables" class="tables"></div>
  </div>

  <script>
    function typeOf(g){
      const t=String(g?.type||'').toLowerCase();
      if(['bebe','bébé','baby','infant','toddlers','toddler'].includes(t)) return 'bebe';
      if(['enfant','child','kids','kid'].includes(t)) return 'enfant';
      return 'adulte';
    }

    async function load(){
      const r=await fetch('/api/plan');
      const p=await r.json();
      const tables=p.tables||[];
      const allGuests=tables.flatMap(t=>t.guests||[]);
      const total=allGuests.length;
      const adults=allGuests.filter(g=>typeOf(g)==='adulte').length;
      const kids=allGuests.filter(g=>typeOf(g)==='enfant').length;
      const babies=allGuests.filter(g=>typeOf(g)==='bebe').length;
      document.getElementById('meta').textContent=`${tables.length} table(s) • ${total} invité(s) • Adultes: ${adults} • Enfants: ${kids} • Bébés: ${babies}`;
      const c=document.getElementById('tables');
      c.innerHTML='';
      tables.forEach(t=>{
        const tg=t.guests||[];
        const ta=tg.filter(g=>typeOf(g)==='adulte').length;
        const te=tg.filter(g=>typeOf(g)==='enfant').length;
        const tb=tg.filter(g=>typeOf(g)==='bebe').length;
        const d=document.createElement('div'); d.className='card';
        d.innerHTML=`<h3>${t.name}</h3><div class='muted'>${tg.length}/${t.capacity||0} • Adultes: ${ta} • Enfants: ${te} • Bébés: ${tb}</div>`;
        const ul=document.createElement('ul');
        tg.forEach(g=>{
          const li=document.createElement('li');
          const typ=typeOf(g);
          li.innerHTML=`${g.name} <span class="type ${typ}">${typ==='enfant'?'Enfant':(typ==='bebe'?'Bébé':'Adulte')}</span>`;
          ul.appendChild(li);
        });
        d.appendChild(ul); c.appendChild(d);
      });
    }
    load();
  </script>
</body>
</html>
