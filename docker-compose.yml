version: '3.8'

services:
  wedding-table-planner:
    build: .
    container_name: wedding-table-planner
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - ADMIN_USER=admin
      - ADMIN_PASS=change-me-now
      - SESSION_SECRET=change-this-super-secret-session-key
      - DB_PATH=/app/data/wedding.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
