<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff mobile — Wedding Table Planner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap');
    :root{--bg:#f3ede3;--bg-soft:#faf6f0;--text:#241913;--panel:rgba(255,251,246,.90);--panel-2:rgba(248,240,230,.84);--line:#dccab5;--line-soft:rgba(164,127,89,.18);--muted:#7f6957;--accent:#a47f59;--accent-strong:#7c5836;--accent-soft:#ddc3a5;--shadow:0 20px 48px rgba(67,44,23,.10);--shadow-soft:0 10px 24px rgba(67,44,23,.08);--badge-ad:#f1ebff;--badge-ad-text:#5b21b6;--badge-en:#e8f2fb;--badge-en-text:#32556f;--badge-bb:#fdf0e1;--badge-bb-text:#9b5c24}
    *{box-sizing:border-box}
    body{font-family:'Manrope',Arial,sans-serif;margin:0;background:radial-gradient(circle at top,rgba(255,255,255,.55),transparent 28%),linear-gradient(180deg,var(--bg-soft),var(--bg));color:var(--text)}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.14),transparent 42%),repeating-linear-gradient(0deg,transparent 0 38px,rgba(120,84,53,.028) 38px 39px);opacity:.9}
    .wrap{max-width:760px;margin:0 auto;padding:28px}
    .crumbs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;color:var(--muted);font-size:12px;letter-spacing:.08em;text-transform:uppercase}
    .crumbs a{color:inherit;text-decoration:none;position:relative}
    .crumbs a::after{content:'';position:absolute;left:0;right:0;bottom:-2px;height:1px;background:currentColor;opacity:.25}
    h1{margin:0 0 8px;font:600 32px/1.05 'Cormorant Garamond',serif;letter-spacing:.02em}
    .muted{color:var(--muted);font-size:14px;margin-bottom:16px}
    input{width:100%;padding:14px 16px;border:1px solid rgba(164,127,89,.22);border-radius:18px;background:rgba(255,255,255,.8);color:var(--text);font:inherit;font-size:15px;box-shadow:var(--shadow-soft);transition:box-shadow .2s ease}
    input:focus{outline:none;box-shadow:var(--shadow),0 0 0 2px var(--accent-soft)}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line-soft);border-radius:20px;padding:16px;margin:12px 0;box-shadow:var(--shadow-soft)}
    .badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700}
    .badge.adulte{background:var(--badge-ad);color:var(--badge-ad-text)}
    .badge.enfant{background:var(--badge-en);color:var(--badge-en-text)}
    .badge.bebe{background:var(--badge-bb);color:var(--badge-bb-text)}
    .table-name{font:600 16px/1.2 'Cormorant Garamond',serif;color:var(--accent-strong);margin-bottom:4px}
    .info{font-size:13px;color:var(--muted)}
    .info strong{color:var(--text)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="crumbs"><a href="admin.html">Admin</a> · <a href="visual.html">Plan visuel</a> · <a href="day-of.html">Jour J</a> · <a href="staff.html">Staff</a></div>
    <h1>📱 Staff mobile</h1>
    <div class="muted">Recherche rapide d'un invité → table assignée</div>
    <input id="q" placeholder="Rechercher un nom (ex: Martin)" />
    <div id="results"></div>
  </div>

  <script>
    let index=[];
    const q=document.getElementById('q');
    const out=document.getElementById('results');

    function tLabel(t){return t==='enfant'?'Enfant':(t==='bebe'?'Bébé':'Adulte');}
    
    function escapeHtml(v){
      return String(v||'')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#39;');
    }

    async function load(){
      const r=await fetch('/api/plan');
      const p=await r.json();
      index=[];
      (p.tables||[]).forEach(t=>{
        (t.guests||[]).forEach(g=>index.push({name:g.name,type:g.type||'adulte',table:t.name||'Table ?',regime:g.regime||'',notes:g.adminNotes||''}));
      });
      render('');
    }

    function render(term){
      const s=term.trim().toLowerCase();
      const rows=(s?index.filter(x=>x.name.toLowerCase().includes(s)):index).slice(0,80);
      out.innerHTML='';
      if(rows.length===0){ out.innerHTML='<div class="muted" style="margin-top:20px">Aucun résultat</div>'; return; }
      rows.forEach(r=>{
        const d=document.createElement('div'); d.className='card';
        let html=`<div class="table-name">${escapeHtml(r.table)}</div>`;
        html+=`<div><strong>${escapeHtml(r.name)}</strong> <span class="badge ${r.type}">${tLabel(r.type)}</span></div>`;
        if(r.regime) html+=`<div class="info">Régime: <strong>${escapeHtml(r.regime)}</strong></div>`;
        if(r.notes) html+=`<div class="info">Notes: <strong>${escapeHtml(r.notes)}</strong></div>`;
        d.innerHTML=html;
        out.appendChild(d);
      });
    }

    q.addEventListener('input',()=>render(q.value));
    load();
  </script>
</body>
</html>
