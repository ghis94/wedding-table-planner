<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion admin — Wedding Table Planner</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a;display:grid;place-items:center;min-height:100vh;margin:0}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:18px;max-width:360px;width:100%}
    input,button{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;margin-top:8px}
    button{background:#0f172a;color:#fff;cursor:pointer}
    .muted{color:#64748b;font-size:13px}
    .err{color:#b91c1c;margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Connexion admin</h2>
    <p class="muted">Accès protégé par session (plus robuste que Basic Auth).</p>
    <form id="f">
      <input name="username" placeholder="Utilisateur" required />
      <input name="password" type="password" placeholder="Mot de passe" required />
      <button type="submit">Se connecter</button>
      <div id="err" class="err"></div>
    </form>
  </div>
  <script>
    document.getElementById('f').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const data=Object.fromEntries(new FormData(e.target).entries());
      const r=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      if(r.ok){ window.location.href='/admin.html'; return; }
      document.getElementById('err').textContent='Identifiants invalides';
    });
  </script>
</body>
</html>
