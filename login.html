<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion admin — Wedding Table Planner</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .login-card {
      max-width: 400px;
      width: 100%;
      padding: 36px;
      text-align: center;
    }
    .login-card h2 {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .login-card .muted {
      margin-bottom: 28px;
    }
    .error-message {
      color: var(--error-text);
      background: var(--error-bg);
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }
    .error-message.show {
      display: block;
    }
    .theme-float {
      position: fixed;
      top: 16px;
      right: 16px;
    }
  </style>
</head>
<body>
  <div class="theme-float" id="theme-container"></div>

  <div class="card login-card">
    <h2>🔐 Connexion</h2>
    <p class="muted">Accès admin sécurisé par session</p>
    
    <form id="loginForm">
      <div class="form-group">
        <input type="text" name="username" placeholder="Utilisateur" required autocomplete="username" />
      </div>
      <div class="form-group">
        <input type="password" name="password" placeholder="Mot de passe" required autocomplete="current-password" />
      </div>
      <button type="submit">Se connecter</button>
      <div id="error" class="error-message">Identifiants invalides</div>
    </form>
  </div>

  <script src="theme.js"></script>
  <script>
    // Add theme toggle
    window.ThemeManager.createToggle(document.getElementById('theme-container'));

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target).entries());
      
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Connexion…';
      
      try {
        const r = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (r.ok) {
          window.location.href = '/admin.html';
        } else {
          document.getElementById('error').classList.add('show');
        }
      } catch (err) {
        document.getElementById('error').textContent = 'Erreur de connexion';
        document.getElementById('error').classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
