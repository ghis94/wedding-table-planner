<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion admin — Wedding Table Planner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap');
    :root{--bg:#f3ede3;--bg-soft:#faf6f0;--text:#241913;--panel:rgba(255,251,246,.94);--line:#dccab5;--line-soft:rgba(164,127,89,.18);--muted:#7f6957;--accent:#a47f59;--accent-strong:#7c5836;--shadow:0 20px 48px rgba(67,44,23,.10)}
    *{box-sizing:border-box}
    body{font-family:'Manrope',Arial,sans-serif;margin:0;background:radial-gradient(circle at top,rgba(255,255,255,.55),transparent 28%),linear-gradient(180deg,var(--bg-soft),var(--bg));color:var(--text);display:grid;place-items:center;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.14),transparent 42%),repeating-linear-gradient(0deg,transparent 0 38px,rgba(120,84,53,.028) 38px 39px);opacity:.9}
    .card{background:linear-gradient(180deg,var(--panel),rgba(248,240,230,.84));border:1px solid var(--line-soft);border-radius:30px;padding:32px;max-width:400px;width:100%;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
    h2{margin:0 0 8px;font:600 32px/1.05 'Cormorant Garamond',serif;letter-spacing:.02em;text-align:center}
    .muted{color:var(--muted);font-size:14px;text-align:center;display:block;margin-bottom:24px}
    input,button{width:100%;padding:14px 18px;border:1px solid rgba(164,127,89,.22);border-radius:16px;background:rgba(255,255,255,.8);color:var(--text);font:inherit;font-size:15px;transition:box-shadow .2s ease}
    input{box-shadow:inset 0 1px 0 rgba(255,255,255,.45);margin-bottom:12px}
    input:focus{outline:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 0 0 2px var(--accent-soft)}
    button{background:linear-gradient(135deg,var(--accent-strong),var(--accent));color:#fffaf4;border-color:transparent;cursor:pointer;font-weight:700;box-shadow:0 10px 20px rgba(124,88,54,.20)}
    button:hover{transform:translateY(-1px)}
    .err{color:#b91c1c;margin-top:12px;font-size:13px;text-align:center}
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Connexion</h2>
    <span class="muted">Accès admin sécurisé par session</span>
    <form id="f">
      <input name="username" placeholder="Utilisateur" required />
      <input name="password" type="password" placeholder="Mot de passe" required />
      <button type="submit">Se connecter</button>
      <div id="err" class="err"></div>
    </form>
  </div>
  <script>
    document.getElementById('f').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const data=Object.fromEntries(new FormData(e.target).entries());
      const r=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      if(r.ok){ window.location.href='/admin.html'; return; }
      document.getElementById('err').textContent='Identifiants invalides';
    });
  </script>
</body>
</html>
