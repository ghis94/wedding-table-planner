<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartes de table — Wedding Table Planner</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&family=Inter:wght@400;500;600&family=Allura&display=swap');

    .postcards-page { display:grid; gap:24px; }
    .postcards-toolbar {
      display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
      padding:16px 18px; border-radius:22px;
      background:linear-gradient(180deg, rgba(255,250,245,.86), rgba(249,240,231,.72));
      border:1px solid rgba(187,151,118,.18);
      box-shadow: var(--shadow-sm);
    }
    .toolbar-controls {
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .postcards-grid {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(10cm, 10cm));
      gap: 24px;
      justify-content:center;
      align-items:start;
    }
    .place-card {
      position:relative;
      width:10cm;
      height:15cm;
      padding:.86cm .78cm .68cm;
      border-radius:28px;
      overflow:hidden;
      border:1px solid rgba(195,157,121,.24);
      box-shadow: 0 24px 70px rgba(109, 80, 53, .16);
      background: linear-gradient(180deg, rgba(252,246,239,.98), rgba(241,226,213,.94));
      page-break-inside: avoid;
      break-inside: avoid;
      isolation:isolate;
      box-sizing:border-box;
      display:flex;
    }
    .place-card::before {
      content:'';
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 82% 12%, rgba(191,150,115,.16), transparent 18%),
        radial-gradient(circle at 16% 88%, rgba(173,129,98,.10), transparent 20%),
        linear-gradient(180deg, rgba(255,255,255,.22), transparent 18%);
      pointer-events:none;
      z-index:0;
    }
    .botanical,
    .botanical-bottom {
      position:absolute;
      pointer-events:none;
      z-index:0;
      opacity:.72;
    }
    .botanical {
      right:-8px; top:-2px; width:138px; height:210px;
    }
    .botanical-bottom {
      left:-10px; bottom:-8px; width:146px; height:220px; transform: scaleX(-1) rotate(-8deg);
      opacity:.54;
    }
    .card-frame {
      position:absolute;
      inset: 10px;
      border-radius:22px;
      border:1px solid rgba(191,150,115,.18);
      pointer-events:none;
      z-index:0;
    }
    .card-frame::before,
    .card-frame::after {
      content:'';
      position:absolute;
      width:22px;
      height:22px;
      border:1px solid rgba(191,150,115,.34);
      border-radius:50%;
      background: rgba(255,255,255,.3);
    }
    .card-frame::before { top:-11px; left:calc(50% - 11px); }
    .card-frame::after { bottom:-11px; left:calc(50% - 11px); }
    .print-safe-area {
      position:absolute;
      inset: 22px;
      border: 1px dashed rgba(191,150,115,.16);
      border-radius: 18px;
      pointer-events:none;
      z-index:0;
    }
    .theme-nude { --card-bg-start: rgba(252,246,239,.98); --card-bg-end: rgba(239,225,212,.95); --title-color:#ab7b4c; --accent-line: rgba(173,129,98,.68); --label-color:#8a6446; }
    .theme-sand { --card-bg-start: rgba(251,246,240,.98); --card-bg-end: rgba(233,222,210,.95); --title-color:#a17655; --accent-line: rgba(160,124,94,.64); --label-color:#84654d; }
    .theme-blush { --card-bg-start: rgba(250,242,238,.98); --card-bg-end: rgba(236,220,214,.95); --title-color:#b07c76; --accent-line: rgba(184,128,120,.6); --label-color:#8e6661; }
    .theme-linen { --card-bg-start: rgba(248,242,235,.98); --card-bg-end: rgba(232,220,208,.95); --title-color:#9d7b5c; --accent-line: rgba(155,120,92,.62); --label-color:#7f654d; }
    .theme-clay { --card-bg-start: rgba(249,240,233,.98); --card-bg-end: rgba(229,210,196,.95); --title-color:#a56a50; --accent-line: rgba(171,108,82,.62); --label-color:#845946; }
    .theme-champagne { --card-bg-start: rgba(252,248,240,.98); --card-bg-end: rgba(239,231,214,.95); --title-color:#b89157; --accent-line: rgba(184,145,87,.66); --label-color:#8c734c; }
    .theme-ivory { --card-bg-start: rgba(255,252,247,.99); --card-bg-end: rgba(241,235,226,.96); --title-color:#9b7b5b; --accent-line: rgba(155,123,91,.58); --label-color:#7b6752; }
    .theme-rosewater { --card-bg-start: rgba(252,243,243,.98); --card-bg-end: rgba(240,224,225,.95); --title-color:#ba7d89; --accent-line: rgba(186,125,137,.58); --label-color:#94666f; }
    .theme-sage { --card-bg-start: rgba(244,247,241,.98); --card-bg-end: rgba(225,233,221,.95); --title-color:#7b8d6b; --accent-line: rgba(123,141,107,.58); --label-color:#627155; }
    .theme-olive { --card-bg-start: rgba(243,242,235,.98); --card-bg-end: rgba(225,224,209,.95); --title-color:#7a7a54; --accent-line: rgba(122,122,84,.58); --label-color:#676748; }
    .theme-eucalyptus { --card-bg-start: rgba(240,246,243,.98); --card-bg-end: rgba(219,232,226,.95); --title-color:#5f8b79; --accent-line: rgba(95,139,121,.58); --label-color:#537261; }
    .theme-forest-mist { --card-bg-start: rgba(238,243,238,.98); --card-bg-end: rgba(214,224,214,.95); --title-color:#667b69; --accent-line: rgba(102,123,105,.58); --label-color:#556658; }
    .theme-dusty-blue { --card-bg-start: rgba(242,246,250,.98); --card-bg-end: rgba(219,228,236,.95); --title-color:#6d87a1; --accent-line: rgba(109,135,161,.58); --label-color:#5b6f83; }
    .theme-powder-blue { --card-bg-start: rgba(244,248,252,.98); --card-bg-end: rgba(225,234,243,.95); --title-color:#7a96b3; --accent-line: rgba(122,150,179,.56); --label-color:#617994; }
    .theme-slate-blue { --card-bg-start: rgba(241,243,249,.98); --card-bg-end: rgba(218,223,235,.95); --title-color:#6e789a; --accent-line: rgba(110,120,154,.58); --label-color:#5d6581; }
    .theme-french-blue { --card-bg-start: rgba(239,245,251,.98); --card-bg-end: rgba(215,227,242,.95); --title-color:#587ba5; --accent-line: rgba(88,123,165,.58); --label-color:#4f6887; }
    .theme-lavender { --card-bg-start: rgba(246,242,250,.98); --card-bg-end: rgba(229,221,240,.95); --title-color:#8d79a8; --accent-line: rgba(141,121,168,.58); --label-color:#75638b; }
    .theme-mauve { --card-bg-start: rgba(247,240,246,.98); --card-bg-end: rgba(229,215,228,.95); --title-color:#9a6d8f; --accent-line: rgba(154,109,143,.58); --label-color:#7f5e77; }
    .theme-lilac { --card-bg-start: rgba(248,244,252,.98); --card-bg-end: rgba(229,222,243,.95); --title-color:#927fb6; --accent-line: rgba(146,127,182,.58); --label-color:#78679a; }
    .theme-peach { --card-bg-start: rgba(252,244,236,.98); --card-bg-end: rgba(241,223,211,.95); --title-color:#c5855d; --accent-line: rgba(197,133,93,.58); --label-color:#9a6e50; }
    .theme-apricot { --card-bg-start: rgba(252,245,238,.98); --card-bg-end: rgba(240,225,212,.95); --title-color:#c28b63; --accent-line: rgba(194,139,99,.58); --label-color:#9a7357; }
    .theme-coral { --card-bg-start: rgba(252,241,237,.98); --card-bg-end: rgba(240,219,213,.95); --title-color:#c46f62; --accent-line: rgba(196,111,98,.58); --label-color:#986057; }
    .theme-terracotta { --card-bg-start: rgba(248,238,233,.98); --card-bg-end: rgba(231,209,198,.95); --title-color:#b9684e; --accent-line: rgba(185,104,78,.58); --label-color:#8d5747; }
    .theme-rust { --card-bg-start: rgba(247,238,234,.98); --card-bg-end: rgba(228,208,198,.95); --title-color:#a85b45; --accent-line: rgba(168,91,69,.58); --label-color:#824a3a; }
    .theme-cinnamon { --card-bg-start: rgba(248,241,236,.98); --card-bg-end: rgba(230,214,205,.95); --title-color:#9f6d55; --accent-line: rgba(159,109,85,.58); --label-color:#7d5947; }
    .theme-espresso { --card-bg-start: rgba(243,236,232,.98); --card-bg-end: rgba(222,208,200,.95); --title-color:#7d5a49; --accent-line: rgba(125,90,73,.58); --label-color:#65493d; }
    .theme-charcoal { --card-bg-start: rgba(241,239,238,.98); --card-bg-end: rgba(219,214,212,.95); --title-color:#68615f; --accent-line: rgba(104,97,95,.58); --label-color:#56514f; }
    .theme-minimal-black { --card-bg-start: rgba(245,245,244,.98); --card-bg-end: rgba(230,229,227,.95); --title-color:#2f2b29; --accent-line: rgba(47,43,41,.46); --label-color:#4f4742; }
    .theme-gold-foil { --card-bg-start: rgba(251,247,238,.98); --card-bg-end: rgba(238,229,210,.95); --title-color:#bb9456; --accent-line: rgba(187,148,86,.72); --label-color:#8a7147; }
    .theme-garden-party { --card-bg-start: rgba(244,248,241,.98); --card-bg-end: rgba(226,235,219,.95); --title-color:#6e9271; --accent-line: rgba(110,146,113,.6); --label-color:#5c775e; }
    .theme-modern-serif { --card-bg-start: rgba(250,248,245,.98); --card-bg-end: rgba(234,229,223,.95); --title-color:#6d6158; --accent-line: rgba(109,97,88,.56); --label-color:#5e544d; }
    .card-inner {
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      min-height:100%;
      width:100%;
      justify-content:flex-start;
      padding: .06cm 0;
    }
    .card-eyebrow {
      text-align:center;
      color:#b28a63;
      text-transform:uppercase;
      letter-spacing:.28em;
      font-size:9px;
      font-weight:700;
      margin-bottom:10px;
    }
    .card-title {
      margin: 2px 0 4px;
      font-family:'Allura', 'Great Vibes', cursive;
      font-size: clamp(2.6rem, 3.6vw, 3.3rem);
      line-height:.95;
      text-align:center;
      color:#ab7b4c;
      font-weight:400;
      text-wrap:balance;
      text-shadow: 0 1px 0 rgba(255,255,255,.55);
    }
    .card-divider {
      width:74px; height:1px; margin: 8px auto 12px;
      background: linear-gradient(90deg, transparent, rgba(173,129,98,.68), transparent);
    }
    .card-subtitle {
      text-align:center;
      margin-bottom:8px;
      font-family:'Cormorant Garamond', serif;
      font-size:.9rem;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#8a6446;
    }
    .guest-summary {
      text-align:center;
      margin-bottom:8px;
      font-size:10px;
      color:#9b7656;
      letter-spacing:.1em;
      text-transform:uppercase;
    }
    .guest-list {
      display:grid;
      gap:6px;
      margin-top:4px;
      align-content:start;
      align-self:stretch;
      padding: 0 2px;
      flex:1;
    }
    .guest-item {
      padding: 6px 9px;
      text-align:center;
      border-radius:999px;
      background: rgba(255,255,255,.34);
      border: 1px solid rgba(187,151,118,.12);
      color:#5c4332;
      font-size:12px;
      line-height:1.16;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.24);
      font-family:'Cormorant Garamond', serif;
      font-weight:600;
      letter-spacing:.01em;
      text-wrap:balance;
    }
    .place-card.is-dense {
      padding:.76cm .7cm .58cm;
    }
    .place-card.is-dense .card-eyebrow { margin-bottom:7px; font-size:8px; }
    .place-card.is-dense .card-title { font-size: clamp(2.25rem, 3vw, 2.8rem); }
    .place-card.is-dense .card-divider { margin: 6px auto 10px; }
    .place-card.is-dense .card-subtitle { margin-bottom:6px; font-size:.82rem; }
    .place-card.is-dense .guest-summary { margin-bottom:6px; font-size:9px; }
    .place-card.is-dense .guest-list { gap:5px; }
    .place-card.is-dense .guest-item { padding:5px 8px; font-size:11px; line-height:1.08; }
    .place-card.is-dense .card-footer { padding-top:8px; font-size:9px; }

    .place-card.is-very-dense {
      padding:.66cm .62cm .5cm;
    }
    .place-card.is-very-dense .card-frame { inset: 8px; }
    .place-card.is-very-dense .card-eyebrow { margin-bottom:5px; font-size:7px; letter-spacing:.22em; }
    .place-card.is-very-dense .card-title { margin: 0 0 2px; font-size: clamp(1.95rem, 2.5vw, 2.35rem); }
    .place-card.is-very-dense .card-divider { width:60px; margin: 5px auto 8px; }
    .place-card.is-very-dense .card-subtitle { margin-bottom:5px; font-size:.72rem; }
    .place-card.is-very-dense .guest-summary { margin-bottom:5px; font-size:8px; }
    .place-card.is-very-dense .guest-list { gap:4px; }
    .place-card.is-very-dense .guest-item { padding:4px 7px; font-size:10px; line-height:1.02; }
    .place-card.is-very-dense .card-footer { padding-top:6px; font-size:8px; letter-spacing:.16em; }
    .place-card.is-two-columns .guest-list {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items:start;
      column-gap:6px;
      row-gap:4px;
    }
    .place-card.is-two-columns .guest-item {
      padding:4px 6px;
      font-size:10px;
      line-height:1.04;
      min-width:0;
    }
    .card-footer {
      margin-top:auto;
      padding-top:14px;
      text-align:center;
      color:#a07b5b;
      font-size:10px;
      letter-spacing:.22em;
      text-transform:uppercase;
    }
    .place-card {
      --card-bg-start: rgba(252,246,239,.98);
      --card-bg-end: rgba(241,226,213,.94);
      --title-color:#ab7b4c;
      --accent-line: rgba(173,129,98,.68);
      --label-color:#8a6446;
      background: linear-gradient(180deg, var(--card-bg-start), var(--card-bg-end));
    }
    .card-title { color: var(--title-color); }
    .card-divider { background: linear-gradient(90deg, transparent, var(--accent-line), transparent); }
    .card-subtitle,
    .guest-summary { color: var(--label-color); }

    .empty-state {
      padding:20px; text-align:center; border-radius:18px; background:rgba(255,255,255,.38); color:var(--text-muted); border:1px solid var(--line-soft);
    }

    @media print {
      @page { size: 10cm 15cm portrait; margin: 0; }
      html, body { width:10cm; height:15cm; }
      body::before, .wedding-header, .postcards-toolbar, .crumbs, .hero { display:none !important; }
      body { background:#fff !important; margin:0 !important; }
      .wrap { max-width:none; padding:0 !important; margin:0 !important; }
      .postcards-grid { display:block; }
      .place-card { width:10cm !important; height:15cm !important; border-radius:0; box-shadow:none; margin:0; page-break-after:always; }
      .print-safe-area { display:block !important; }
    }
  </style>
</head>
<body>
  <script src="theme.js"></script>
  <script src="header.js" defer></script>
  <div class="wrap">
    <div class="crumbs"><a href="admin.html">Admin</a> · <a href="visual.html">Plan visuel</a> · <a href="postcards.html">Cartes</a></div>
    <div class="postcards-page">
      <section class="hero">
        <h1>Cartes de table</h1>
        <p>Des cartes portrait 10×15 pensées pour un présentoir : ambiance nude, typographie élégante, touches dorées et fleurs séchées discrètes.</p>
      </section>
      <div class="postcards-toolbar">
        <div class="muted">Format portrait élégant pour annoncer la place des invités.</div>
        <div class="toolbar-controls">
          <select id="themeSelect" class="mini-select" style="min-width:220px" onchange="applyTheme(this.value)"></select>
          <div class="toolbar" style="padding:0;background:none;border:0;box-shadow:none;position:static">
          <button onclick="window.print()">Imprimer</button>
          <button class="ghost" onclick="load()">Rafraîchir</button>
          </div>
        </div>
      </div>
      <div id="cards" class="postcards-grid"></div>
    </div>
  </div>

  <script>
    const themeOptions = [
      ['theme-nude', 'Nude signature'],
      ['theme-sand', 'Sand'],
      ['theme-blush', 'Blush'],
      ['theme-linen', 'Linen'],
      ['theme-clay', 'Clay'],
      ['theme-champagne', 'Champagne'],
      ['theme-ivory', 'Ivory'],
      ['theme-rosewater', 'Rosewater'],
      ['theme-sage', 'Sage'],
      ['theme-olive', 'Olive'],
      ['theme-eucalyptus', 'Eucalyptus'],
      ['theme-forest-mist', 'Forest mist'],
      ['theme-dusty-blue', 'Dusty blue'],
      ['theme-powder-blue', 'Powder blue'],
      ['theme-slate-blue', 'Slate blue'],
      ['theme-french-blue', 'French blue'],
      ['theme-lavender', 'Lavender'],
      ['theme-mauve', 'Mauve'],
      ['theme-lilac', 'Lilac'],
      ['theme-peach', 'Peach'],
      ['theme-apricot', 'Apricot'],
      ['theme-coral', 'Coral'],
      ['theme-terracotta', 'Terracotta'],
      ['theme-rust', 'Rust'],
      ['theme-cinnamon', 'Cinnamon'],
      ['theme-espresso', 'Espresso'],
      ['theme-charcoal', 'Charcoal'],
      ['theme-minimal-black', 'Minimal black'],
      ['theme-gold-foil', 'Gold foil'],
      ['theme-garden-party', 'Garden party'],
      ['theme-modern-serif', 'Modern serif']
    ];
    let currentTheme = localStorage.getItem('postcards-theme') || 'theme-nude';
    function escapeHtml(v){ return String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;'); }
    function floralSvg(cls='') {
      return `
        <svg class="${cls}" viewBox="0 0 180 260" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M68 248C74 213 78 181 77 149C76 121 67 92 48 63" stroke="#B88D66" stroke-width="2.2" stroke-linecap="round" opacity=".55"/>
          <path d="M80 231C102 201 112 171 112 136C112 104 103 73 84 44" stroke="#9A6F4E" stroke-width="1.9" stroke-linecap="round" opacity=".45"/>
          <path d="M41 86C26 83 16 72 12 54C27 58 38 66 45 80" fill="#DAB9A1" opacity=".7"/>
          <path d="M34 118C18 117 8 109 3 93C20 96 31 104 38 113" fill="#E6CAB7" opacity=".62"/>
          <path d="M98 62C112 55 121 42 124 24C111 28 100 37 94 51" fill="#C89A72" opacity=".58"/>
          <path d="M120 104C136 98 146 85 150 68C135 72 124 82 117 95" fill="#D9B296" opacity=".55"/>
          <circle cx="85" cy="40" r="10" fill="#E7D0BF" opacity=".65"/>
          <circle cx="49" cy="78" r="8" fill="#E2C3AD" opacity=".56"/>
          <circle cx="117" cy="92" r="8" fill="#D1A684" opacity=".52"/>
          <circle cx="25" cy="110" r="7" fill="#EAD6C7" opacity=".58"/>
        </svg>`;
    }
    function densityClass(count) {
      if (count >= 15) return 'is-very-dense';
      if (count >= 11) return 'is-dense';
      return '';
    }
    function layoutClass(count) {
      return count >= 16 ? 'is-two-columns' : '';
    }
    function initThemeSelect() {
      const select = document.getElementById('themeSelect');
      if (!select) return;
      select.innerHTML = themeOptions.map(([value, label]) => `<option value="${value}">${label}</option>`).join('');
      if (!themeOptions.some(([value]) => value === currentTheme)) currentTheme = 'theme-nude';
      select.value = currentTheme;
    }
    function applyTheme(theme) {
      currentTheme = theme;
      localStorage.setItem('postcards-theme', currentTheme);
      load();
    }
    async function load(){
      const r = await fetch('/api/plan');
      if(!r.ok){ document.getElementById('cards').innerHTML = '<div class="empty-state">Connexion requise.</div>'; return; }
      const plan = await r.json();
      const cards = document.getElementById('cards');
      const tables = (plan.tables || []).filter(Boolean);
      if(!tables.length){ cards.innerHTML = '<div class="empty-state">Aucune table disponible.</div>'; return; }
      cards.innerHTML = '';
      tables.forEach((table, index) => {
        const guests = (table.guests || [])
          .filter(Boolean)
          .slice()
          .sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'fr', { sensitivity: 'base' }));
        const el = document.createElement('article');
        el.className = `place-card ${currentTheme} ${densityClass(guests.length)} ${layoutClass(guests.length)}`.trim();
        el.innerHTML = `
          ${floralSvg('botanical')}
          ${floralSvg('botanical-bottom')}
          <div class="card-frame"></div>
          <div class="print-safe-area"></div>
          <div class="card-inner">
            <div class="card-eyebrow">Mariage</div>
            <div class="card-title">${escapeHtml(table.name || 'Table')}</div>
            <div class="card-divider"></div>
            <div class="card-subtitle">Votre table</div>
            <div class="guest-summary">${guests.length ? `${guests.length} invité${guests.length > 1 ? 's' : ''}` : 'Placement en cours'}</div>
            <div class="guest-list">
              ${guests.length ? guests.map(g => `<div class="guest-item">${escapeHtml(g.name || 'Invité')}</div>`).join('') : '<div class="guest-item">Table en préparation</div>'}
            </div>
            <div class="card-footer">Avec amour & célébration</div>
          </div>`;
        cards.appendChild(el);
      });
    }
    initThemeSelect();
    load();
  </script>
</body>
</html>
