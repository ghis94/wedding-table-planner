<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartes de tables — Wedding Table Planner</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .postcard-shell { display:grid; gap:24px; }
    .postcard-toolbar {
      display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
      padding:16px 18px; border-radius:22px; background:linear-gradient(180deg,var(--surface-strong),var(--surface));
      border:1px solid var(--line-soft); box-shadow:var(--shadow-sm);
    }
    .postcard-grid {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 340px));
      gap: 22px;
      justify-content: center;
    }
    .postcard {
      position:relative;
      min-height: 480px;
      padding: 26px 24px 22px;
      border-radius: 28px;
      overflow:hidden;
      border:1px solid rgba(181,136,99,.24);
      box-shadow: 0 24px 60px rgba(92,63,39,.16);
      display:flex;
      flex-direction:column;
      page-break-inside: avoid;
      break-inside: avoid;
      isolation:isolate;
    }
    .postcard::before,
    .postcard::after {
      content:'';
      position:absolute;
      inset:auto;
      pointer-events:none;
      opacity:.9;
      z-index:0;
    }
    .postcard::before {
      width:180px; height:180px; left:-28px; bottom:-36px;
      background: radial-gradient(circle, rgba(191,148,105,.22), transparent 68%);
      filter: blur(4px);
    }
    .postcard::after {
      width:190px; height:210px; right:-32px; top:-34px;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.30), transparent 26%),
        radial-gradient(circle at 48% 44%, rgba(166,106,74,.18), transparent 22%),
        radial-gradient(circle at 62% 68%, rgba(117,87,60,.14), transparent 16%),
        radial-gradient(circle at 76% 24%, rgba(181,136,99,.16), transparent 14%);
      transform: rotate(16deg);
    }
    .postcard-inner { position:relative; z-index:1; display:flex; flex-direction:column; height:100%; }
    .postcard-mark {
      display:inline-flex; align-items:center; gap:8px; margin-bottom:14px;
      color:#9c6f49; font-size:11px; letter-spacing:.16em; text-transform:uppercase; font-weight:800;
    }
    .postcard-mark::before,
    .postcard-mark::after {
      content:''; width:22px; height:1px; background:currentColor; opacity:.45;
    }
    .postcard-title {
      font-family:'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 2.6rem);
      line-height:1;
      color:#9a6f3d;
      text-align:center;
      margin: 8px 0 10px;
      text-shadow: 0 1px 0 rgba(255,255,255,.36);
    }
    .postcard-subtitle {
      text-align:center;
      color: rgba(90,67,49,.74);
      font-size:13px;
      margin-bottom:22px;
    }
    .guest-stack { display:grid; gap:10px; margin-top: 8px; }
    .guest-line {
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.34);
      border: 1px solid rgba(169,125,92,.14);
      backdrop-filter: blur(4px);
    }
    .guest-name { color:#5f4635; font-weight:600; }
    .guest-meta { color:#9b7a60; font-size:11px; text-transform:uppercase; letter-spacing:.08em; }
    .postcard-footer {
      margin-top:auto; padding-top:18px; display:flex; justify-content:space-between; align-items:center; gap:10px;
      border-top:1px solid rgba(158,118,88,.18);
      color:#8e6a4f; font-size:12px;
    }
    .postcard-count {
      display:inline-flex; padding:7px 12px; border-radius:999px; background:rgba(255,255,255,.34); border:1px solid rgba(169,125,92,.18);
      color:#7f5b42; font-weight:700;
    }
    .theme-nude { background: linear-gradient(180deg, #f6ede4, #ecd9c8); }
    .theme-sand { background: linear-gradient(180deg, #f5eee7, #e6d7cb); }
    .theme-rose { background: linear-gradient(180deg, #f4e8e4, #e7d1cb); }
    .theme-clay { background: linear-gradient(180deg, #f2e4db, #ddc1b1); }
    .theme-ivory { background: linear-gradient(180deg, #faf4ec, #efe3d4); }
    .theme-linen { background: linear-gradient(180deg, #f4efe9, #e9ddd1); }

    @media print {
      body::before, .wedding-header, .postcard-toolbar, .crumbs { display:none !important; }
      body { background:#fff !important; }
      .wrap { max-width:none; padding:0 !important; }
      .postcard-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12mm; }
      .postcard { box-shadow:none !important; }
    }
  </style>
</head>
<body>
  <script src="theme.js"></script>
  <script src="header.js" defer></script>
  <div class="wrap">
    <div class="crumbs"><a href="admin.html">Admin</a> · <a href="visual.html">Plan visuel</a> · <a href="postcards.html">Cartes</a></div>
    <div class="postcard-shell">
      <section class="hero">
        <h1>Cartes de table</h1>
        <p>Des cartes portrait élégantes, pensées pour l’impression ou la présentation, avec une ambiance nude, dorée et fleurs séchées.</p>
      </section>
      <div class="postcard-toolbar">
        <div class="muted">Une carte par table, format portrait, lisible et décoratif.</div>
        <div class="toolbar" style="padding:0;background:none;border:0;box-shadow:none;position:static">
          <button onclick="window.print()">Imprimer</button>
          <button class="ghost" onclick="load()">Rafraîchir</button>
        </div>
      </div>
      <div id="cards" class="postcard-grid"></div>
    </div>
  </div>

  <script>
    const themes = ['theme-nude','theme-sand','theme-rose','theme-clay','theme-ivory','theme-linen'];
    function typeOf(g){ const t=String(g?.type||'').toLowerCase(); if(['bebe','bébé','baby','infant'].includes(t)) return 'Bébé'; if(['enfant','child','kids','kid'].includes(t)) return 'Enfant'; return 'Adulte'; }
    function escapeHtml(v){ return String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;'); }
    async function load(){
      const r=await fetch('/api/plan');
      if(!r.ok){ document.getElementById('cards').innerHTML = '<div class="card">Connexion requise.</div>'; return; }
      const plan=await r.json();
      const cards=document.getElementById('cards');
      const tables=(plan.tables||[]).filter(Boolean);
      if(!tables.length){ cards.innerHTML = '<div class="card text-center muted">Aucune table disponible.</div>'; return; }
      cards.innerHTML='';
      tables.forEach((table, index) => {
        const guests=(table.guests||[]).filter(Boolean);
        const theme = themes[index % themes.length];
        const el=document.createElement('article');
        el.className=`postcard ${theme}`;
        el.innerHTML = `
          <div class="postcard-inner">
            <div class="postcard-mark">Mariage • Table</div>
            <div class="postcard-title">${escapeHtml(table.name || 'Table')}</div>
            <div class="postcard-subtitle">Disposition des invités</div>
            <div class="guest-stack">
              ${guests.length ? guests.map(g => `
                <div class="guest-line">
                  <span class="guest-name">${escapeHtml(g.name || 'Invité')}</span>
                  <span class="guest-meta">${escapeHtml(typeOf(g))}</span>
                </div>
              `).join('') : '<div class="guest-line"><span class="guest-name">Aucun invité</span><span class="guest-meta">Vide</span></div>'}
            </div>
            <div class="postcard-footer">
              <span>Wedding Table Planner</span>
              <span class="postcard-count">${guests.length} invité${guests.length > 1 ? 's' : ''}</span>
            </div>
          </div>`;
        cards.appendChild(el);
      });
    }
    load();
  </script>
</body>
</html>
