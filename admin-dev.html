<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dev — Wedding Table Planner</title>
  <style>
    :root{
      --bg:#070b17;
      --card:#0f172acc;
      --line:#243042;
      --txt:#e6eefc;
      --muted:#9fb0c9;
      --accent:#7c3aed;
      --accent2:#06b6d4;
      --ok:#16a34a;
      --warn:#b45309;
      --danger:#b91c1c;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--txt);background:radial-gradient(1200px 700px at 10% -10%,#312e8155,transparent),radial-gradient(900px 500px at 100% 0%,#0ea5e955,transparent),var(--bg)}
    .wrap{max-width:1280px;margin:0 auto;padding:24px}
    .hero{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
    .title{font-size:clamp(24px,3vw,36px);font-weight:800;letter-spacing:.2px}
    .subtitle{color:var(--muted);font-size:14px}
    .pill{display:inline-block;padding:6px 10px;border:1px solid #334155;border-radius:999px;background:#0b1220;color:#cbd5e1;font-size:12px}

    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 18px}
    .btn{border:1px solid var(--line);background:#111b2d;color:#e2e8f0;padding:10px 12px;border-radius:12px;cursor:pointer;transition:.2s}
    .btn:hover{transform:translateY(-1px);border-color:#475569}
    .btn.primary{background:linear-gradient(135deg,var(--accent),#4f46e5);border-color:#6d28d9}
    .btn.ok{background:linear-gradient(135deg,#15803d,#16a34a);border-color:#15803d}
    .btn.warn{background:linear-gradient(135deg,#92400e,#b45309);border-color:#92400e}
    .btn.danger{background:linear-gradient(135deg,#7f1d1d,#b91c1c);border-color:#7f1d1d}

    .layout{display:grid;grid-template-columns:360px 1fr;gap:14px}
    @media(max-width:980px){.layout{grid-template-columns:1fr}}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;backdrop-filter:blur(10px)}
    .card h3{margin:0 0 10px 0}
    .muted{color:var(--muted);font-size:13px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    input,textarea,select{width:100%;background:#0a1323;color:var(--txt);border:1px solid #334155;border-radius:12px;padding:10px}
    textarea{min-height:90px;resize:vertical}

    .guest{padding:9px 10px;border:1px solid #334155;border-radius:12px;margin:8px 0;background:#0b1426;cursor:grab;display:flex;justify-content:space-between;align-items:center;gap:8px}
    .type{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid #334155;font-weight:700}
    .type.adulte{background:#312e81;color:#c7d2fe}
    .type.enfant{background:#083344;color:#a5f3fc}

    .tables{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:10px}
    .table{border:1px dashed #475569;border-radius:14px;padding:10px;background:#0b1426;min-height:100px}
    .table h4{margin:0 0 8px 0}
    .kpi{font-size:12px;color:#a3b5cf}
    .link{color:#a78bfa}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <div class="title">✨ Admin Dev — Wedding Table Planner</div>
        <div class="subtitle">Version design moderne / expérimentation UI. Même API, même données.</div>
      </div>
      <div class="pill">/admin-dev.html</div>
    </div>

    <div class="toolbar">
      <button class="btn" onclick="loadGuests()">Charger RSVPs</button>
      <button class="btn primary" onclick="addTable()">+ Table</button>
      <button class="btn ok" onclick="savePlan()">Sauvegarder</button>
      <button class="btn" onclick="window.print()">Exporter PDF</button>
      <button class="btn warn" onclick="exportJson()">Exporter JSON</button>
      <button class="btn danger" onclick="resetAll()">Reset</button>
      <a class="btn link" href="admin.html">Version classique</a>
    </div>

    <div class="layout">
      <div class="card">
        <h3>Import CSV invités</h3>
        <p class="muted">Colonnes: <code>prenom,nom,type</code> (<code>type=adulte|enfant</code>).</p>
        <textarea id="csvInput" placeholder="prenom,nom,type&#10;Alice,Martin,adulte&#10;Lina,Martin,enfant"></textarea>
        <button class="btn primary" style="margin-top:8px" onclick="importCsv()">Importer CSV</button>

        <hr style="border-color:#223047;margin:16px 0" />

        <h3>Invités</h3>
        <div class="row">
          <input id="quickAdd" placeholder="Ajouter un invité" onkeydown="if(event.key==='Enter')quickAddGuest()" style="flex:1" />
          <select id="quickType" style="max-width:130px">
            <option value="adulte">Adulte</option>
            <option value="enfant">Enfant</option>
          </select>
        </div>
        <button class="btn" style="margin-top:8px" onclick="quickAddGuest()">Ajouter</button>
        <div id="guests"></div>
      </div>

      <div class="card">
        <h3>Tables</h3>
        <div id="tables" class="tables"></div>
      </div>
    </div>
  </div>

  <script>
    let guests=[], tables=[];
    async function api(url, opts={}){ const r=await fetch(url, opts); if(!r.ok) throw new Error(await r.text()); return r.json(); }
    function normalizeName(g){ return `${(g.prenom||'').trim()} ${(g.nom||'').trim()}`.trim(); }
    function normalizeType(v){ const t=String(v||'').toLowerCase(); return ['enfant','child','kids','kid'].includes(t)?'enfant':'adulte'; }
    function guestTag(g){ const t=normalizeType(g.type); return `<span class="type ${t}">${t==='enfant'?'Enfant':'Adulte'}</span>`; }

    function expandRsvp(r){
      const base = normalizeName(r) || r.name || 'Invité';
      const out=[]; const a=Math.max(0,Number(r.adultes||0)); const e=Math.max(0,Number(r.enfants||0));
      if(a===0&&e===0){ out.push({id:crypto.randomUUID(),name:base,type:'adulte'}); return out; }
      for(let i=1;i<=a;i++) out.push({id:crypto.randomUUID(),name:a===1?base:`${base} (Adulte ${i})`,type:'adulte'});
      for(let i=1;i<=e;i++) out.push({id:crypto.randomUUID(),name:`${base} (Enfant ${i})`,type:'enfant'});
      return out;
    }

    async function loadGuests(){
      const raw=await api('/api/rsvps');
      const yes=raw.filter(g=>String(g.presence||'').toLowerCase()==='oui');
      const expanded=yes.flatMap(expandRsvp);
      guests=[...guests,...expanded.filter(n=>!guests.some(g=>g.name===n.name&&normalizeType(g.type)===normalizeType(n.type)))];
      renderGuests();
    }

    function quickAddGuest(){ const i=document.getElementById('quickAdd'); const t=document.getElementById('quickType'); const v=i.value.trim(); if(!v) return; guests.push({id:crypto.randomUUID(),name:v,type:normalizeType(t.value)}); i.value=''; renderGuests(); }
    async function importCsv(){ const csv=document.getElementById('csvInput').value; const res=await api('/api/import-csv',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({csv})}); guests=[...guests,...res.guests.filter(n=>!guests.some(g=>g.name===n.name&&normalizeType(g.type)===normalizeType(n.type)))]; renderGuests(); alert(`${res.count} invité(s) importé(s)`); }

    function addTable(){ const n=tables.length+1; tables.push({id:crypto.randomUUID(),name:'Table '+n,capacity:10,guests:[]}); renderTables(); }
    function removeTable(id){ const t=tables.find(x=>x.id===id); if(!t) return; guests.push(...t.guests); tables=tables.filter(x=>x.id!==id); renderAll(); }

    function renderGuests(){ const c=document.getElementById('guests'); c.innerHTML=''; guests.forEach(g=>{ const d=document.createElement('div'); d.className='guest'; d.draggable=true; d.dataset.id=g.id; d.innerHTML=`<span>${g.name}</span>${guestTag(g)}`; d.ondragstart=e=>e.dataTransfer.setData('text/plain',g.id); c.appendChild(d); }); }

    function renderTables(){
      const c=document.getElementById('tables'); c.innerHTML='';
      tables.forEach(t=>{
        const b=document.createElement('div'); b.className='table'; b.ondragover=e=>e.preventDefault(); b.ondrop=e=>{e.preventDefault(); assignToTable(e.dataTransfer.getData('text/plain'),t.id)};
        const adultCount=(t.guests||[]).filter(g=>normalizeType(g.type)==='adulte').length;
        const childCount=(t.guests||[]).filter(g=>normalizeType(g.type)==='enfant').length;
        b.innerHTML=`<h4>${t.name}</h4><div class="kpi">Capacité: <input type="number" min="1" value="${t.capacity}" style="width:74px" onchange="setCap('${t.id}',this.value)"></div><div class="kpi">Places: ${t.guests.length}/${t.capacity}</div><div class="kpi">Adultes: ${adultCount} • Enfants: ${childCount}</div><button class="btn danger" style="margin:6px 0" onclick="removeTable('${t.id}')">Supprimer</button>`;
        t.guests.forEach(g=>{ const d=document.createElement('div'); d.className='guest'; d.innerHTML=`<span>${g.name}</span>${guestTag(g)}`; d.onclick=()=>unassign(g.id,t.id); b.appendChild(d); });
        c.appendChild(b);
      });
    }

    function setCap(id,val){ const t=tables.find(x=>x.id===id); if(!t) return; t.capacity=Math.max(1,parseInt(val||'1',10)); renderTables(); }
    function assignToTable(guestId,tableId){ const gi=guests.findIndex(g=>g.id===guestId); if(gi===-1) return; const t=tables.find(x=>x.id===tableId); if(!t) return; if(t.guests.length>=t.capacity){alert('Table pleine');return;} t.guests.push(guests[gi]); guests.splice(gi,1); renderAll(); }
    function unassign(guestId,tableId){ const t=tables.find(x=>x.id===tableId); if(!t) return; const i=t.guests.findIndex(g=>g.id===guestId); if(i===-1) return; guests.push(t.guests[i]); t.guests.splice(i,1); renderAll(); }

    async function savePlan(){ await api('/api/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tables,guests})}); alert('Plan sauvegardé ✅'); }
    function exportJson(){ const blob=new Blob([JSON.stringify({tables,guests,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='plan-de-table.json'; a.click(); }
    function resetAll(){ if(!confirm('Réinitialiser le plan ?')) return; guests=[]; tables=[]; renderAll(); }
    function renderAll(){ renderGuests(); renderTables(); }

    (async function boot(){ try{ const p=await api('/api/plan'); guests=p.guests||[]; tables=p.tables||[]; }catch(e){} renderAll(); })();
  </script>
</body>
</html>
